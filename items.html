<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Items - Momla Wiki</title>
  <style>
    body {
      margin: 0;
      background-color: #1a1a1a;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    .navbar {
      background-color: #111;
      padding: 15px 30px;
      display: flex;
      gap: 20px;
      border-bottom: 2px solid #444;
    }

    .navbar a {
      color: #cccccc;
      text-decoration: none;
      font-size: 16px;
      padding: 8px 16px;
      border-radius: 4px;
    }

    .navbar a:hover {
      background-color: #333;
      color: #ffffff;
    }

    .navbar a.active {
      background-color: #c0392b;
      color: #ffffff;
    }

    .content {
      padding: 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 30px;
    }

    h2 {
      font-size: 20px;
      color: #c0392b;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
      margin-top: 40px;
    }

    .item-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .item-list li {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-list li:hover {
      background-color: #2a2a2a;
    }

    .item-name {
      font-size: 16px;
    }

    .item-location {
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="items.html" class="active">Items</a>
    <a href="locations.html">Locations</a>
  </div>

  <div class="content">
    <h1>Items</h1>

    <h2>Consumables</h2>
    <ul class="item-list">
      <li>
        <span class="item-name">Health Potion</span>
        <span class="item-location">Found in: Momla Area</span>
      </li>
    </ul>

    <h2>Key Items</h2>
    <ul class="item-list">
      <li>
        <span class="item-name">Old Key</span>
        <span class="item-location">Found in: Momla Area</span>
      </li>
    </ul>

  </div>

</body>
</html>
